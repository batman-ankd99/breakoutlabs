<!DOCTYPE html>
<html>
<head>
    <title>Momentum Dashboard</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        button { padding: 10px 20px; margin-bottom: 20px; cursor: pointer; }
        table { border-collapse: collapse; width: 60%; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background: #f4f4f4; }
        .loading { color: orange; margin-left: 10px; }
    </style>
</head>
<body>

<h2>📊 Momentum Engine Dashboard</h2>

<button onclick="runMomentum()">🚀 Run Momentum Engine</button>
<button onclick="loadData()">🔄 Refresh Table</button>

<span id="status"></span>

<table>
    <thead>
        <tr>
            <th>Symbol</th>
            <th>Score</th>
        </tr>
    </thead>
    <tbody id="table"></tbody>
</table>

<script>

async function runMomentum() {
    document.getElementById("status").innerText = "⏳ Running momentum engine...";

    await fetch("/api/momentum/run", {
        method: "POST"
    });

    document.getElementById("status").innerText = "✅ Completed";
    loadData();
}

async function loadData() {
    document.getElementById("status").innerText = "⏳ Loading data...";

    const res = await fetch("/api/momentum/latest");
    const data = await res.json();

    const table = document.getElementById("table");
    table.innerHTML = "";

    if (!Array.isArray(data) || data.length === 0) {
        table.innerHTML = `<tr><td colspan="2">No data available</td></tr>`;
        return;
    }

    data.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${row.symbol}</td>
            <td>${Number(row.score).toFixed(4)}</td>
        `;
        table.appendChild(tr);
    });

    document.getElementById("status").innerText = "✅ Updated";
}

// auto-load on page open
loadData();

</script>

</body>
</html>
